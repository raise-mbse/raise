name: CI/CD RAISE

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  quality-and-build:
    name: 🏭 Industrial Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            clang mold libasound2-dev

      # Utilise automatiquement rust-toolchain.toml
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install SBOM Tool (cargo-cyclonedx)
        run: cargo install cargo-cyclonedx

      # Étape 1 : Quality Gate (Lint, Format, Test)
      - name: Run Quality Gate
        run: make check

      # Étape 2 : Build complet (WASM, SBOM, Release)
      - name: Build and SBOM
        run: make build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raise-artifacts
          path: |
            target/release/
            sbom-rust.cdx.json
          retention-days: 5

  release:
    name: 🚀 Publish Release
    needs: quality-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: raise-artifacts
          path: release_out

      - name: Prepare Checksums
        run: |
          cd release_out
          sha256sum * > SHA256SUMS.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_out/*
          draft: true
          generate_release_notes: true